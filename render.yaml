services:
  - type: web
    name: gestionecole
    runtime: python
    region: oregon
    plan: free
    buildCommand: ./build.sh
    startCommand: gunicorn GestionEcole.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: NODE_VERSION
        value: "20"
      - key: ALLOWED_HOSTS
        value: ".onrender.com,localhost,127.0.0.1"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://*.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: gestionecole-db
          property: connectionString
      - key: USE_SQLITE_FALLBACK
        value: "true"
      - key: USE_POSTGRESQL
        value: "false"
      - key: DJANGO_SETTINGS_MODULE
        value: GestionEcole.settings
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

databases:
  - name: gestionecole-db
    databaseName: gestionecole
    plan: free
    region: oregon
